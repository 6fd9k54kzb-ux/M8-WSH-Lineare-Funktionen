<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lineare Funktionen – Üben & Verstehen</title>
<style>
:root {
  --accent: #6B4FA0;
  --accent-dark: #4d357d;
  --accent-soft: #efe9f7;
  --success: #2E7D32;
  --success-soft: #eef8ef;
  --error: #C62828;
  --error-soft: #fff0f0;
  --hint: #E65100;
  --hint-soft: #fff5ec;
  --bg: #f5f6f8;
  --card: #ffffff;
  --text: #1d1d1f;
  --muted: #5d6470;
  --border: #dde1e8;
  --shadow: 0 10px 30px rgba(30, 25, 45, .08);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: linear-gradient(180deg, #ffffff 0%, var(--bg) 280px);
  color: var(--text);
  font-size: 16px;
  line-height: 1.55;
}
button, input, textarea, select { font: inherit; }
button { touch-action: manipulation; }
.app {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 24px 0 44px;
}
.hero {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 22px;
}
.hero-top {
  display: flex;
  gap: 16px;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
}
h1 {
  margin: 0;
  font-size: clamp(1.8rem, 4vw, 3rem);
  letter-spacing: -0.04em;
  color: #17141f;
}
.subtitle {
  color: var(--muted);
  margin-top: 4px;
  font-size: 1.05rem;
}
.progress-wrap {
  min-width: min(100%, 360px);
  background: #fafafa;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-weight: 700;
  color: #25212f;
  margin-bottom: 8px;
}
.progress-bar {
  width: 100%;
  height: 14px;
  border-radius: 999px;
  background: #e7e9ef;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--success);
  border-radius: 999px;
  transition: width .25s ease;
}
.toolbar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
  gap: 14px;
  margin-bottom: 22px;
}
.chapter-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 6px 20px rgba(20, 20, 20, .04);
  cursor: pointer;
  text-align: left;
  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.chapter-card:hover, .chapter-card:focus-visible {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: var(--shadow);
  outline: none;
}
.chapter-card.active {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.chapter-card h2 {
  margin: 0 0 4px;
  font-size: 1.03rem;
  line-height: 1.3;
}
.chapter-card p {
  margin: 0 0 12px;
  color: var(--muted);
  font-size: .95rem;
}
.chapter-meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  color: var(--muted);
  font-size: .9rem;
  margin-top: 7px;
}
.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.panel-head {
  padding: 22px 24px;
  border-bottom: 1px solid var(--border);
  background: #fff;
}
.panel-head h2 {
  margin: 0;
  font-size: clamp(1.45rem, 2vw, 2rem);
}
.panel-head p {
  color: var(--muted);
  margin: 5px 0 0;
}
.tabs {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}
.tab {
  border: 1px solid var(--accent);
  background: #fff;
  color: var(--accent);
  padding: 10px 16px;
  border-radius: 999px;
  font-weight: 800;
  cursor: pointer;
}
.tab.active {
  background: var(--accent);
  color: #fff;
}
.tasks {
  padding: 20px;
  display: grid;
  gap: 16px;
}
.task-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(20, 20, 20, .04);
}
.task-card.solved {
  border-color: rgba(46, 125, 50, .55);
}
.task-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 10px;
}
.task-kicker {
  color: var(--accent);
  font-weight: 800;
  font-size: .92rem;
}
.task-title {
  margin: 2px 0 8px;
  font-size: 1.25rem;
  line-height: 1.3;
}
.badge {
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: 999px;
  padding: 5px 10px;
  background: #f0f1f4;
  color: var(--muted);
  font-size: .9rem;
  font-weight: 800;
}
.badge.done {
  background: var(--success-soft);
  color: var(--success);
}
.stem {
  margin-bottom: 14px;
}
.diagram {
  background: #fbfbfd;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  margin: 14px 0;
  overflow-x: auto;
}
.diagram svg {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}
.inputs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 12px;
  margin: 14px 0;
}
.field label {
  display: block;
  font-weight: 700;
  margin-bottom: 6px;
}
.field input, textarea {
  width: 100%;
  border: 1px solid #cbd0da;
  border-radius: 12px;
  padding: 11px 12px;
  background: #fff;
  min-height: 44px;
}
.field input:focus, textarea:focus {
  border-color: var(--accent);
  outline: 3px solid rgba(107,79,160,.18);
}
textarea {
  min-height: 118px;
  resize: vertical;
}
.input-correct {
  border-color: var(--success) !important;
  background: var(--success-soft) !important;
}
.input-wrong {
  border-color: var(--error) !important;
  background: var(--error-soft) !important;
}
.options {
  display: grid;
  gap: 10px;
  margin: 14px 0;
}
.option {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  cursor: pointer;
  background: #fff;
}
.option input {
  margin-top: 3px;
  min-width: 18px;
  min-height: 18px;
}
.option-correct {
  border-color: var(--success);
  background: var(--success-soft);
}
.option-wrong {
  border-color: var(--error);
  background: var(--error-soft);
}
.matrix-wrap {
  overflow-x: auto;
  margin: 14px 0;
}
.matrix {
  width: 100%;
  border-collapse: collapse;
  min-width: 620px;
}
.matrix th, .matrix td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}
.matrix th:first-child, .matrix td:first-child {
  text-align: left;
  font-weight: 700;
}
.matrix tr.row-correct {
  background: var(--success-soft);
}
.matrix tr.row-wrong {
  background: var(--error-soft);
}
.pair-zone {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 14px 0;
}
.pair-col {
  display: grid;
  gap: 10px;
  align-content: start;
}
.pair-col h4 {
  margin: 0 0 2px;
}
.pair-item {
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 14px;
  padding: 12px;
  text-align: left;
  cursor: pointer;
  min-height: 52px;
}
.pair-item.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.pair-item.matched {
  border-color: var(--success);
}

.pair-item.pair-correct {
  border-color: var(--success);
  background: var(--success-soft);
}
.pair-item.pair-wrong {
  border-color: var(--error);
  background: var(--error-soft);
}
.match-list {
  background: #fafafa;
  border: 1px dashed #cbd0da;
  border-radius: 14px;
  padding: 10px;
  margin-top: 10px;
  color: var(--muted);
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 10px 0 12px;
}
.chip {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  background: #eef0f4;
  color: #3a3f4a;
  padding: 5px 10px;
  font-weight: 700;
  font-size: .92rem;
}
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
}
.btn {
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #fff;
  border-radius: 999px;
  padding: 10px 16px;
  font-weight: 800;
  cursor: pointer;
}
.btn:hover, .btn:focus-visible {
  background: var(--accent-dark);
  outline: none;
}
.btn.secondary {
  background: #fff;
  color: var(--accent);
}
.btn.secondary:hover, .btn.secondary:focus-visible {
  background: var(--accent-soft);
}
.btn.danger {
  border-color: var(--error);
  color: var(--error);
  background: #fff;
}
.btn.danger:hover, .btn.danger:focus-visible {
  background: var(--error-soft);
}
.feedback {
  display: none;
  border-left: 4px solid var(--hint);
  border-radius: 12px;
  padding: 12px 14px;
  margin-top: 14px;
  background: var(--hint-soft);
}
.feedback.show { display: block; }
.feedback.success {
  border-left-color: var(--success);
  background: var(--success-soft);
}
.feedback.error {
  border-left-color: var(--error);
  background: var(--error-soft);
}
.feedback.partial {
  border-left-color: var(--hint);
  background: var(--hint-soft);
}
details.solution {
  margin-top: 10px;
}
details.solution summary {
  color: var(--accent);
  font-weight: 800;
  cursor: pointer;
}
.empty {
  color: var(--muted);
  padding: 20px;
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
.footer-note {
  color: var(--muted);
  font-size: .9rem;
  margin-top: 18px;
  text-align: center;
}
@media (max-width: 760px) {
  .app { width: min(100% - 20px, 1180px); padding-top: 10px; }
  .hero, .panel { border-radius: 18px; }
  .hero { padding: 18px; }
  .tasks { padding: 12px; }
  .task-card { padding: 16px; }
  .pair-zone { grid-template-columns: 1fr; }
  .hero-top { display: block; }
  .progress-wrap { margin-top: 16px; }
}
@media print {
  body { background: #fff; }
  .toolbar, .grid, .tabs, .actions { display: none !important; }
  .panel, .hero, .task-card { box-shadow: none; }
  .task-card { break-inside: avoid; }
}
</style>
</head>

const STORAGE_KEY = "lineare_funktionen_progress_v1";
const LEVEL_LABEL = { M: "★ M", R: "★★ R" };
let solved = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]").filter(id => TASKS.some(t => t.id === id)));
let currentChapter = localStorage.getItem("lineare_funktionen_current_chapter") || "K0";
let currentLevel = localStorage.getItem("lineare_funktionen_current_level") || "M";
let pairState = {};

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function taskById(id) {
  return TASKS.find(t => t.id === id);
}

function chapterCounts(chapterId) {
  const all = TASKS.filter(t => t.chapter === chapterId);
  const done = all.filter(t => solved.has(t.id)).length;
  return { done, total: all.length };
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...solved]));
}

function markSolved(id) {
  if (!solved.has(id)) {
    solved.add(id);
    saveProgress();
  }
  updateProgressOnly();
  const card = document.getElementById("card-" + id);
  if (card) {
    card.classList.add("solved");
    const badge = card.querySelector(".badge");
    if (badge) {
      badge.classList.add("done");
      badge.textContent = "✓ gelöst";
    }
  }
}

function updateProgressOnly() {
  const total = TASKS.length;
  const done = solved.size;
  document.getElementById("totalText").textContent = `${done} von ${total} Aufgaben gelöst ✓`;
  document.getElementById("totalFill").style.width = total ? `${Math.round(done / total * 100)}%` : "0%";
  renderNav();
}

function renderNav() {
  const nav = document.getElementById("chapterNav");
  nav.innerHTML = CHAPTERS.map(ch => {
    const c = chapterCounts(ch.id);
    const percent = c.total ? Math.round(c.done / c.total * 100) : 0;
    return `<button class="chapter-card ${ch.id === currentChapter ? "active" : ""}" onclick="openChapter('${ch.id}')" aria-label="${escapeHtml(ch.title)} öffnen">
      <h2>${escapeHtml(ch.title)}</h2>
      <p>${escapeHtml(ch.subtitle)}</p>
      <div class="progress-bar" aria-hidden="true"><div class="progress-fill" style="width:${percent}%"></div></div>
      <div class="chapter-meta"><span>${c.done} / ${c.total} Aufgaben gelöst</span><span>${percent}%</span></div>
    </button>`;
  }).join("");
}

function openChapter(chapterId) {
  currentChapter = chapterId;
  localStorage.setItem("lineare_funktionen_current_chapter", chapterId);
  renderAll();
  document.getElementById("chapterPanel").scrollIntoView({behavior:"smooth", block:"start"});
}

function setLevel(level) {
  currentLevel = level;
  localStorage.setItem("lineare_funktionen_current_level", level);
  renderChapter();
}

function renderAll() {
  updateProgressOnly();
  renderChapter();
}

function renderChapter() {
  const panel = document.getElementById("chapterPanel");
  const chapter = CHAPTERS.find(ch => ch.id === currentChapter) || CHAPTERS[0];
  const levelTasks = TASKS.filter(t => t.chapter === chapter.id && t.level === currentLevel);
  const mCount = TASKS.filter(t => t.chapter === chapter.id && t.level === "M").length;
  const rCount = TASKS.filter(t => t.chapter === chapter.id && t.level === "R").length;
  panel.innerHTML = `
    <section class="panel-head">
      <h2>${escapeHtml(chapter.title)}</h2>
      <p>${escapeHtml(chapter.subtitle)}</p>
      <div class="tabs" role="tablist" aria-label="Niveaustufen">
        <button class="tab ${currentLevel === "M" ? "active" : ""}" onclick="setLevel('M')" role="tab" aria-selected="${currentLevel === "M"}">★ M <span aria-hidden="true">(${mCount})</span></button>
        <button class="tab ${currentLevel === "R" ? "active" : ""}" onclick="setLevel('R')" role="tab" aria-selected="${currentLevel === "R"}">★★ R <span aria-hidden="true">(${rCount})</span></button>
      </div>
    </section>
    <section class="tasks">
      ${levelTasks.length ? levelTasks.map(renderTask).join("") : `<div class="empty">Für diese Niveaustufe sind in diesem Kapitel keine Aufgaben angelegt.</div>`}
    </section>`;
}

function renderTask(task) {
  const done = solved.has(task.id);
  return `<article class="task-card ${done ? "solved" : ""}" id="card-${task.id}">
    <div class="task-top">
      <div>
        <div class="task-kicker">${escapeHtml(task.competence)} · ${LEVEL_LABEL[task.level]}</div>
        <h3 class="task-title">${escapeHtml(task.title)}</h3>
      </div>
      <span class="badge ${done ? "done" : ""}">${done ? "✓ gelöst" : "offen"}</span>
    </div>
    <div class="stem">${task.stem}</div>
    ${task.diagram ? `<div class="diagram">${renderDiagram(task.diagram)}</div>` : ""}
    ${renderTaskBody(task)}
    <div class="actions">
      <button class="btn" onclick="checkTask('${task.id}')">Überprüfen</button>
      <button class="btn secondary" onclick="resetTask('${task.id}')">Nochmal</button>
      ${task.level === "R" ? `<button class="btn secondary" onclick="generateNewTask('${task.id}')">Neue Aufgabe generieren</button>` : ""}
    </div>
    <div class="feedback" id="feedback-${task.id}" aria-live="polite"></div>
  </article>`;
}

function renderTaskBody(task) {
  if (task.type === "mc") return renderMC(task);
  if (task.type === "numeric") return renderNumeric(task);
  if (task.type === "matrix") return renderMatrix(task);
  if (task.type === "pairs") return renderPairs(task);
  if (task.type === "freetext") return renderFreeText(task);
  if (task.type === "mixed") return renderMixed(task);
  return "";
}

function renderMC(task) {
  const inputType = task.multi ? "checkbox" : "radio";
  return `<div class="options" role="${task.multi ? "group" : "radiogroup"}" aria-label="${escapeHtml(task.title)} Optionen">
    ${task.options.map((opt, i) => `
      <label class="option" id="opt-${task.id}-${i}">
        <input type="${inputType}" name="${task.id}_mc" value="${i}" data-task="${task.id}">
        <span>${opt.text}</span>
      </label>`).join("")}
  </div>`;
}

function renderNumeric(task) {
  return `<div class="inputs">${task.fields.map(field => renderField(task, field)).join("")}</div>`;
}

function renderField(task, field) {
  const type = field.inputType === "text" ? "text" : "number";
  const step = type === "number" ? ' step="any"' : "";
  const placeholder = field.placeholder ? ` placeholder="${escapeHtml(field.placeholder)}"` : "";
  return `<div class="field">
    <label for="${task.id}_${field.name}">${escapeHtml(field.label)}</label>
    <input id="${task.id}_${field.name}" name="${field.name}" data-task="${task.id}" type="${type}"${step}${placeholder} inputmode="${type === "number" ? "decimal" : "text"}">
  </div>`;
}

function renderFreeText(task) {
  return `${renderKeywordChips(task)}
    <div class="field">
      <label for="${task.id}_text">Deine Antwort</label>
      <textarea id="${task.id}_text" data-task="${task.id}" placeholder="Formuliere einen vollständigen Satz."></textarea>
    </div>
    <details class="solution"><summary>Musterlösung anzeigen</summary><p>${escapeHtml(task.sample || "")}</p></details>`;
}

function renderMixed(task) {
  return `<div class="inputs">${task.fields.map(field => renderField(task, field)).join("")}</div>
    ${renderKeywordChips(task)}
    <div class="field">
      <label for="${task.id}_text">Antwortsatz / Begründung</label>
      <textarea id="${task.id}_text" data-task="${task.id}" placeholder="Formuliere deine Begründung als vollständigen Satz."></textarea>
    </div>
    <details class="solution"><summary>Musterlösung anzeigen</summary><p>${escapeHtml(task.sample || "")}</p></details>`;
}

function renderKeywordChips(task) {
  return `<div><strong>Verwende in deinem Satz:</strong><div class="chips">${(task.keywords || []).map(k => `<span class="chip">${escapeHtml(k)}</span>`).join("")}</div></div>`;
}

function renderMatrix(task) {
  return `<div class="matrix-wrap">
    <table class="matrix" aria-label="${escapeHtml(task.title)}">
      <thead><tr><th>Gleichung / Paar</th>${task.choices.map(c => `<th>${escapeHtml(c)}</th>`).join("")}</tr></thead>
      <tbody>
        ${task.rows.map(row => `<tr id="row-${task.id}-${row.id}">
          <td>${row.label}</td>
          ${task.choices.map(choice => `<td><label><input type="radio" name="${task.id}_${row.id}" value="${escapeHtml(choice)}" data-task="${task.id}"> <span class="sr-only">${escapeHtml(choice)}</span></label></td>`).join("")}
        </tr>`).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderPairs(task) {
  if (!pairState[task.id]) pairState[task.id] = { selectedLeft: null, matches: {} };
  return `<div class="pair-zone">
    <div class="pair-col">
      <h4>1. Erst links wählen</h4>
      ${task.left.map(item => `<button class="pair-item" id="pair-${task.id}-left-${item.id}" onclick="pairClick('${task.id}','left','${item.id}')">${item.text}</button>`).join("")}
    </div>
    <div class="pair-col">
      <h4>2. Dann rechts zuordnen</h4>
      ${task.right.map(item => `<button class="pair-item" id="pair-${task.id}-right-${item.id}" onclick="pairClick('${task.id}','right','${item.id}')">${item.text}</button>`).join("")}
    </div>
  </div>
  <div class="match-list" id="matches-${task.id}">Noch keine Paare verbunden.</div>`;
}

function renderDiagram(d) {
  if (d.type === "coord") return coordinateSvg(d);
  return "";
}

function coordinateSvg(d) {
  const xMin = d.xMin ?? -5, xMax = d.xMax ?? 5, yMin = d.yMin ?? -5, yMax = d.yMax ?? 5;
  const xUnits = Math.max(1, xMax - xMin);
  const yUnits = Math.max(1, yMax - yMin);
  const cell = d.cell || Math.max(14, Math.min(34, Math.floor(520 / Math.max(xUnits, yUnits))));
  const pad = 42;
  const plotW = xUnits * cell;
  const plotH = yUnits * cell;
  const w = Math.round(plotW + 2 * pad);
  const h = Math.round(plotH + 2 * pad);
  const xLabelStep = d.xLabelStep || d.xStep || 1;
  const yLabelStep = d.yLabelStep || d.yStep || 1;
  const sx = x => pad + (x - xMin) * cell;
  const sy = y => pad + (yMax - y) * cell;
  const isTick = (value, step) => Math.abs(value / step - Math.round(value / step)) < 1e-8;
  const clipId = "clip-" + Math.random().toString(36).slice(2);
  let out = `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Koordinatensystem">`;
  out += `<defs><clipPath id="${clipId}"><rect x="${pad}" y="${pad}" width="${plotW}" height="${plotH}"></rect></clipPath></defs>`;
  out += `<rect x="0" y="0" width="${w}" height="${h}" rx="14" fill="#ffffff"></rect>`;
  for (let x = Math.ceil(xMin); x <= Math.floor(xMax) + 1e-9; x += 1) {
    const xx = sx(x);
    out += `<line x1="${xx}" y1="${pad}" x2="${xx}" y2="${h-pad}" stroke="#e5e7ec" stroke-width="1"></line>`;
    if (Math.abs(x) > 1e-9 && isTick(x, xLabelStep)) out += `<text x="${xx}" y="${Math.min(h - 8, sy(0) + 18)}" text-anchor="middle" font-size="11" fill="#606875">${formatTick(x)}</text>`;
  }
  for (let y = Math.ceil(yMin); y <= Math.floor(yMax) + 1e-9; y += 1) {
    const yy = sy(y);
    out += `<line x1="${pad}" y1="${yy}" x2="${w-pad}" y2="${yy}" stroke="#e5e7ec" stroke-width="1"></line>`;
    if (Math.abs(y) > 1e-9 && isTick(y, yLabelStep)) out += `<text x="${Math.max(12, sx(0) - 8)}" y="${yy + 4}" text-anchor="end" font-size="11" fill="#606875">${formatTick(y)}</text>`;
  }
  const axisX = (0 >= yMin && 0 <= yMax) ? sy(0) : sy(yMin);
  const axisY = (0 >= xMin && 0 <= xMax) ? sx(0) : sx(xMin);
  out += `<line x1="${pad}" y1="${axisX}" x2="${w-pad+8}" y2="${axisX}" stroke="#2f3440" stroke-width="2"></line>`;
  out += `<line x1="${axisY}" y1="${h-pad}" x2="${axisY}" y2="${pad-8}" stroke="#2f3440" stroke-width="2"></line>`;
  out += `<text x="${w-pad+13}" y="${axisX+5}" font-size="13" font-weight="700" fill="#2f3440">x</text>`;
  out += `<text x="${axisY-5}" y="${pad-16}" font-size="13" font-weight="700" fill="#2f3440">y</text>`;
  if (0 >= xMin && 0 <= xMax && 0 >= yMin && 0 <= yMax) {
    out += `<text x="${axisY-8}" y="${axisX+16}" text-anchor="end" font-size="11" fill="#606875">0</text>`;
  }
  out += `<g clip-path="url(#${clipId})">`;
  if (d.lines) {
    d.lines.forEach((line, idx) => {
      const color = idx === 0 ? "#6B4FA0" : idx === 1 ? "#E65100" : "#2E7D32";
      if (line.kind === "anti") {
        let path1 = "", path2 = "";
        for (let x = Math.max(xMin, 0.25); x <= xMax; x += Math.max(0.05, (xMax-xMin)/120)) {
          const y = line.k / x;
          path1 += (path1 ? " L " : "M ") + sx(x).toFixed(2) + " " + sy(y).toFixed(2);
        }
        for (let x = xMin; x <= Math.min(xMax, -0.25); x += Math.max(0.05, (xMax-xMin)/120)) {
          const y = line.k / x;
          path2 += (path2 ? " L " : "M ") + sx(x).toFixed(2) + " " + sy(y).toFixed(2);
        }
        out += `<path d="${path1}" fill="none" stroke="${color}" stroke-width="3"></path><path d="${path2}" fill="none" stroke="${color}" stroke-width="3"></path>`;
      } else {
        const x1 = xMin, x2 = xMax;
        const y1 = line.m * x1 + line.b;
        const y2 = line.m * x2 + line.b;
        out += `<line x1="${sx(x1)}" y1="${sy(y1)}" x2="${sx(x2)}" y2="${sy(y2)}" stroke="${color}" stroke-width="3"></line>`;
      }
    });
  }
  if (d.triangle) {
    const t = d.triangle;
    const x0 = sx(t.x), y0 = sy(t.y);
    const x1 = sx(t.x + t.dx), y1 = sy(t.y);
    const x2 = sx(t.x + t.dx), y2 = sy(t.y + t.dy);
    out += `<polyline points="${x0},${y0} ${x1},${y1} ${x2},${y2}" fill="none" stroke="#2E7D32" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>`;
  }
  out += `</g>`;
  if (d.lines) {
    d.lines.forEach((line, idx) => {
      if (line.kind === "anti" || !line.label) return;
      const color = idx === 0 ? "#6B4FA0" : idx === 1 ? "#E65100" : "#2E7D32";
      let lx = xMax - (xMax-xMin)*0.14;
      let ly = line.m * lx + line.b;
      if (ly > yMax) ly = yMax - (yMax-yMin)*0.08;
      if (ly < yMin) ly = yMin + (yMax-yMin)*0.08;
      out += `<text x="${sx(lx)}" y="${sy(ly)-6}" font-size="13" font-weight="800" fill="${color}">${escapeHtml(line.label)}</text>`;
    });
  }
  if (d.triangle) {
    const t = d.triangle;
    const x0 = sx(t.x), y0 = sy(t.y);
    const x1 = sx(t.x + t.dx), y1 = sy(t.y);
    const x2 = sx(t.x + t.dx), y2 = sy(t.y + t.dy);
    out += `<text x="${(x0+x1)/2}" y="${y1+18}" font-size="12" font-weight="800" fill="#2E7D32">${formatTick(t.dx)}</text>`;
    out += `<text x="${x2+8}" y="${(y1+y2)/2}" font-size="12" font-weight="800" fill="#2E7D32">${formatTick(t.dy)}</text>`;
  }
  if (d.points) {
    d.points.forEach(p => {
      out += `<circle cx="${sx(p.x)}" cy="${sy(p.y)}" r="5.5" fill="#C62828"></circle>`;
      out += `<text x="${sx(p.x)+8}" y="${sy(p.y)-8}" font-size="13" font-weight="800" fill="#C62828">${escapeHtml(p.label || "")}</text>`;
    });
  }
  out += `</svg>`;
  return out;
}

function formatTick(v) {
  return Math.abs(v % 1) < 1e-9 ? String(v) : String(v).replace(".", ",");
}

function checkTask(id) {
  const task = taskById(id);
  if (!task) return;
  if (task.type === "mc") return checkMC(task);
  if (task.type === "numeric") return checkNumeric(task);
  if (task.type === "matrix") return checkMatrix(task);
  if (task.type === "pairs") return checkPairs(task);
  if (task.type === "freetext") return checkFreeText(task);
  if (task.type === "mixed") return checkMixed(task);
}

function parseNumberValue(value) {
  if (typeof value !== "string") return NaN;
  const cleaned = value.trim().replace(",", ".").replace(/€/g, "").replace(/km/g, "").replace(/monate/gi, "");
  if (cleaned === "") return NaN;
  return Number(cleaned);
}

function normalizeTextValue(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/,/g, ".")
    .replace(/−/g, "-")
    .replace(/·/g, "*")
    .replace(/\*/g, "")
    .replace(/:/g, "/")
    .replace(/\s+/g, "")
    .replace(/^f\(x\)=/, "y=");
}

function checkFields(task) {
  let ok = true;
  const messages = [];
  task.fields.forEach(field => {
    const input = document.getElementById(`${task.id}_${field.name}`);
    if (!input) return;
    input.classList.remove("input-correct", "input-wrong");
    if (field.accepted) {
      const norm = normalizeTextValue(input.value);
      const accepted = field.accepted.map(normalizeTextValue);
      const fieldOk = accepted.includes(norm);
      if (fieldOk) {
        input.classList.add("input-correct");
      } else {
        input.classList.add("input-wrong");
        ok = false;
        messages.push(`${field.label}: richtig wäre ${field.accepted[0]}.`);
      }
    } else {
      const val = parseNumberValue(input.value);
      const tol = field.tolerance ?? 0.01;
      const fieldOk = !Number.isNaN(val) && Math.abs(val - Number(field.answer)) <= tol;
      if (fieldOk) {
        input.classList.add("input-correct");
      } else {
        input.classList.add("input-wrong");
        ok = false;
        messages.push(`${field.label}: richtig wäre ${String(field.answer).replace(".", ",")}.`);
      }
    }
  });
  return { ok, messages };
}

function checkNumeric(task) {
  const result = checkFields(task);
  if (result.ok) {
    markSolved(task.id);
    showFeedback(task.id, "success", `✓ Sehr gut! ${task.success || "Alle Eingaben sind richtig."}`);
  } else {
    showFeedback(task.id, "error", `✗ Nicht ganz. ${task.hint || "Prüfe deine Eingaben noch einmal."}<ul>${result.messages.map(m => `<li>${escapeHtml(m)}</li>`).join("")}</ul>`);
  }
}

function checkMC(task) {
  const chosen = [...document.querySelectorAll(`input[name="${task.id}_mc"]:checked`)].map(i => Number(i.value));
  task.options.forEach((opt, i) => {
    const label = document.getElementById(`opt-${task.id}-${i}`);
    if (label) {
      label.classList.remove("option-correct", "option-wrong");
      if (opt.correct) label.classList.add("option-correct");
      if (!opt.correct && chosen.includes(i)) label.classList.add("option-wrong");
    }
  });
  const correct = task.options.map((o, i) => o.correct ? i : null).filter(v => v !== null);
  const ok = chosen.length === correct.length && chosen.every(i => correct.includes(i));
  if (ok) {
    markSolved(task.id);
    showFeedback(task.id, "success", `✓ Sehr gut! ${task.success || "Die Auswahl ist richtig."}`);
  } else {
    showFeedback(task.id, "error", `✗ Nicht ganz. ${task.hint || "Die grün markierten Antworten sind richtig, rot markierte sind falsch ausgewählt."}`);
  }
}

function checkMatrix(task) {
  let allOk = true;
  const missing = [];
  task.rows.forEach(row => {
    const tr = document.getElementById(`row-${task.id}-${row.id}`);
    if (tr) tr.classList.remove("row-correct", "row-wrong");
    const selected = document.querySelector(`input[name="${task.id}_${row.id}"]:checked`);
    const ok = selected && selected.value === row.correct;
    if (tr) tr.classList.add(ok ? "row-correct" : "row-wrong");
    if (!ok) {
      allOk = false;
      missing.push(`${row.label} → ${row.correct}`);
    }
  });
  if (allOk) {
    markSolved(task.id);
    showFeedback(task.id, "success", `✓ Sehr gut! ${task.success || "Alle Zeilen sind richtig zugeordnet."}`);
  } else {
    showFeedback(task.id, "error", `✗ Nicht ganz. ${task.hint || "Prüfe die rot markierten Zeilen."}<ul>${missing.map(m => `<li>${escapeHtml(m)}</li>`).join("")}</ul>`);
  }
}

function pairClick(taskId, side, itemId) {
  const task = taskById(taskId);
  if (!pairState[taskId]) pairState[taskId] = { selectedLeft: null, matches: {} };
  const state = pairState[taskId];
  if (side === "left") {
    state.selectedLeft = itemId;
  } else {
    if (!state.selectedLeft) {
      showFeedback(taskId, "partial", "! Wähle zuerst ein Element auf der linken Seite aus.");
      return;
    }
    Object.keys(state.matches).forEach(leftId => {
      if (state.matches[leftId] === itemId) delete state.matches[leftId];
    });
    state.matches[state.selectedLeft] = itemId;
    state.selectedLeft = null;
  }
  updatePairDisplay(task);
}

function updatePairDisplay(task) {
  const state = pairState[task.id] || { selectedLeft:null, matches:{} };
  task.left.forEach(item => {
    const el = document.getElementById(`pair-${task.id}-left-${item.id}`);
    if (el) {
      el.classList.toggle("selected", state.selectedLeft === item.id);
      el.classList.toggle("matched", Boolean(state.matches[item.id]));
    }
  });
  task.right.forEach(item => {
    const el = document.getElementById(`pair-${task.id}-right-${item.id}`);
    if (el) {
      const isMatched = Object.values(state.matches).includes(item.id);
      el.classList.toggle("matched", isMatched);
      el.classList.remove("selected");
    }
  });
  const box = document.getElementById(`matches-${task.id}`);
  if (box) {
    const lines = Object.entries(state.matches).map(([l, r]) => {
      const leftText = task.left.find(x => x.id === l)?.text || l;
      const rightText = task.right.find(x => x.id === r)?.text || r;
      return `<div>✓ ${leftText} → <strong>${rightText}</strong></div>`;
    });
    box.innerHTML = lines.length ? lines.join("") : "Noch keine Paare verbunden.";
  }
}

function checkPairs(task) {
  const state = pairState[task.id] || { matches: {} };
  const needed = Object.keys(task.correct);
  document.querySelectorAll(`#card-${task.id} .pair-item`).forEach(el => el.classList.remove("pair-correct", "pair-wrong"));
  const allMatched = needed.every(left => state.matches[left]);
  const allCorrect = needed.every(left => state.matches[left] === task.correct[left]);
  if (allMatched) {
    needed.forEach(left => {
      const selectedRight = state.matches[left];
      const isCorrect = selectedRight === task.correct[left];
      const leftEl = document.getElementById(`pair-${task.id}-left-${left}`);
      const rightEl = document.getElementById(`pair-${task.id}-right-${selectedRight}`);
      if (leftEl) leftEl.classList.add(isCorrect ? "pair-correct" : "pair-wrong");
      if (rightEl) rightEl.classList.add(isCorrect ? "pair-correct" : "pair-wrong");
    });
  }
  if (allMatched && allCorrect) {
    markSolved(task.id);
    showFeedback(task.id, "success", `✓ Sehr gut! ${task.success || "Alle Paare passen zusammen."}`);
  } else if (!allMatched) {
    showFeedback(task.id, "partial", `! Fast: Verbinde zuerst alle Paare. ${task.hint || ""}`);
  } else {
    const correctLines = needed.map(left => {
      const l = task.left.find(x => x.id === left)?.text || left;
      const r = task.right.find(x => x.id === task.correct[left])?.text || task.correct[left];
      return `<li>${l} → ${r}</li>`;
    }).join("");
    showFeedback(task.id, "error", `✗ Nicht ganz. Rot markierte Paare sind falsch verbunden. ${task.hint || "Prüfe deine Zuordnungen."}<ul>${correctLines}</ul>`);
  }
}

function checkFreeText(task) {
  const result = checkFreeTextInput(task);
  const type = result.ok ? "success" : result.partial ? "partial" : "error";
  if (result.ok) markSolved(task.id);
  showFeedback(task.id, type, result.html);
}

function checkMixed(task) {
  const fields = checkFields(task);
  const text = checkFreeTextInput(task, true);
  const ok = fields.ok && text.ok;
  if (ok) {
    markSolved(task.id);
    showFeedback(task.id, "success", `✓ Sehr gut! ${task.success || "Die Rechnung und die Begründung stimmen."}`);
  } else {
    const cls = fields.ok || text.partial ? "partial" : "error";
    let html = `! Prüfe noch einmal. ${task.hint || ""}`;
    if (!fields.ok) html += `<ul>${fields.messages.map(m => `<li>${escapeHtml(m)}</li>`).join("")}</ul>`;
    html += text.html ? `<div>${text.html}</div>` : "";
    showFeedback(task.id, cls, html);
  }
}

function checkFreeTextInput(task, returnOnly=false) {
  const textarea = document.getElementById(`${task.id}_text`);
  const inputText = (textarea?.value || "").trim();
  if (textarea) textarea.classList.remove("input-correct", "input-wrong");
  const lower = normalizeForKeyword(inputText);
  const groups = task.keywordGroups || (task.keywords || []).map(k => [k.toLowerCase()]);
  const missing = [];
  groups.forEach((group, idx) => {
    const found = group.some(term => lower.includes(normalizeForKeyword(term)));
    if (!found) missing.push((task.keywords || [])[idx] || group[0]);
  });
  const startsWithCapital = /^[A-ZÄÖÜ]/.test(inputText);
  const hasDoubleSpace = /  /.test(inputText);
  const tooShort = inputText.length < 18;
  let messages = [];
  if (tooShort) messages.push("Inhalt: Formuliere einen vollständigen Satz.");
  if (missing.length > 0) messages.push(`Inhalt: Folgende Schlüsselwörter fehlen noch: ${missing.map(escapeHtml).join(", ")}.`);
  if (!startsWithCapital) messages.push("Rechtschreibung: Beginne deinen Satz mit einem Großbuchstaben.");
  if (hasDoubleSpace) messages.push("Rechtschreibung: Du hast ein doppeltes Leerzeichen.");
  const commonHints = spellingHints(inputText);
  messages = messages.concat(commonHints);
  const ok = messages.length === 0;
  if (textarea) textarea.classList.add(ok ? "input-correct" : "input-wrong");
  if (ok) {
    return {ok:true, partial:true, html:`✓ Sehr gut! ${task.success || "Dein Satz enthält alle wichtigen Begriffe und ist korrekt formuliert."}`};
  }
  const html = `✗ Noch nicht ganz. <ul>${messages.map(m => `<li>${m}</li>`).join("")}</ul>`;
  return {ok:false, partial: missing.length < groups.length && inputText.length >= 18, html};
}

function normalizeForKeyword(str) {
  return String(str || "")
    .toLowerCase()
    .replace(/ä/g, "ä")
    .replace(/ö/g, "ö")
    .replace(/ü/g, "ü")
    .replace(/ß/g, "ss")
    .replace(/−/g, "-")
    .replace(/\s+/g, " ")
    .trim();
}

function spellingHints(text) {
  const lower = text.toLowerCase();
  const hints = [];
  const pairs = [
    ["fuktion", "Meinst du „Funktion“?"],
    ["steigugn", "Meinst du „Steigung“?"],
    ["achsenschnitt", "Meinst du „Achsenabschnitt“?"],
    ["gleichmäsig", "Meinst du „gleichmäßig“?"],
    ["zugeordent", "Meinst du „zugeordnet“?"]
  ];
  pairs.forEach(([wrong, hint]) => {
    if (lower.includes(wrong)) hints.push("Rechtschreibung: " + hint);
  });
  return hints;
}

function showFeedback(id, type, html) {
  const box = document.getElementById("feedback-" + id);
  if (!box) return;
  box.className = "feedback show " + type;
  box.innerHTML = html;
}

function resetTask(id) {
  solved.delete(id);
  saveProgress();
  const task = taskById(id);
  if (!task) return;
  document.querySelectorAll(`[data-task="${id}"]`).forEach(el => {
    if (el.type === "radio" || el.type === "checkbox") el.checked = false;
    else el.value = "";
    el.classList.remove("input-correct", "input-wrong");
  });
  document.querySelectorAll(`#card-${id} .option`).forEach(el => el.classList.remove("option-correct", "option-wrong"));
  document.querySelectorAll(`#card-${id} .pair-item`).forEach(el => el.classList.remove("pair-correct", "pair-wrong"));
  document.querySelectorAll(`#card-${id} tr`).forEach(el => el.classList.remove("row-correct", "row-wrong"));
  pairState[id] = { selectedLeft: null, matches: {} };
  const feedback = document.getElementById("feedback-" + id);
  if (feedback) {
    feedback.className = "feedback";
    feedback.innerHTML = "";
  }
  const card = document.getElementById("card-" + id);
  if (card) {
    card.classList.remove("solved");
    const badge = card.querySelector(".badge");
    if (badge) {
      badge.classList.remove("done");
      badge.textContent = "offen";
    }
    if (task.type === "pairs") updatePairDisplay(task);
  }
  updateProgressOnly();
}

function resetAll() {
  if (!confirm("Möchtest du wirklich den gesamten gespeicherten Fortschritt zurücksetzen?")) return;
  solved = new Set();
  pairState = {};
  localStorage.removeItem(STORAGE_KEY);
  renderAll();
}


function generateNewTask(id) {
  const oldTask = taskById(id);
  if (!oldTask) return;
  const idx = TASKS.findIndex(t => t.id === id);
  const next = buildGeneratedTask(oldTask);
  next.id = oldTask.id;
  next.chapter = oldTask.chapter;
  next.level = oldTask.level;
  next.competence = oldTask.competence;
  next.repeatable = true;
  TASKS[idx] = next;
  solved.delete(id);
  saveProgress();
  pairState[id] = { selectedLeft: null, matches: {} };
  renderChapter();
  updateProgressOnly();
  setTimeout(() => showFeedback(id, "partial", "! Neue Aufgabe generiert. Löse die Variante und klicke anschließend auf „Überprüfen“."), 0);
}

function buildGeneratedTask(task) {
  switch (task.id) {
    case "K1_2_R": return genValueTable(task, [-1,0,1,2], "Wertetabelle zu einer linearen Funktion");
    case "K5_1_R": return genValueTable(task, [-4,-2,0,2,4], "Wertetabelle zu einer linearen Funktion");
    case "K5_3_R": return genValueTableMixed(task, [-2,-1,0,1,2,3,4]);
    case "K2_3_R": return genProportionalPrice(task);
    case "K3_2_R": return genWorkerTask(task);
    case "K7_1_R": return genSlopeChange(task);
    case "K7_2_R": return genSlopePoints(task, false);
    case "K7_5_R": return genSlopePoints(task, true);
    case "K7_4_R": return genGraphLineRead(task);
    case "K7_6_R": return genTriangleTask(task);
    case "K8_1_R": return genYAxisGraph(task);
    case "K8_3_R": return genNullAndIntercept(task);
    case "K9_1_R": return genLinePositionMatrix(task);
    case "K9_2_R": return genParallelTask(task);
    case "K10_1_R": return genIntersectionRead(task, true);
    case "K10_2_R": return genIntersectionNumeric(task);
    case "K10_3_R": return genErrorIntersection(task);
    case "K10_4_R": return genGraphEquationIntersection(task);
    case "K10_5_R": return genIntersectionCheck(task);
    case "K6_2_R": return genGraphEvaluation(task);
    case "K11_1_R": return genTwoTariffs(task);
    case "K11_2_R": return genTariffIntersection(task);
    case "K11_4_R": return genFullTariffComparison(task);
    case "K11_5_R": return genFixedValueComparison(task);
    case "K11_6_R": return genStartFeeText(task);
    default: return genDefaultVariant(task);
  }
}

function rndInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffleCopy(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function round2(n) { return Math.round((Number(n) + Number.EPSILON) * 100) / 100; }
function fmt(n) {
  const v = round2(n);
  return Number.isInteger(v) ? String(v).replace("-", "−") : String(v).replace(".", ",").replace("-", "−");
}

    keywords:["Schnittpunkt","gleich teuer",`ab ${fmt(d.x)} Monaten`], keywordGroups:[["schnittpunkt"],["gleich teuer","gleich viel","gleiche kosten"],[`ab ${fmt(d.x)} monaten`,`nach ${fmt(d.x)} monaten`,`${fmt(d.x)} monate`]],
    sample:`Der Schnittpunkt liegt bei ${fmt(d.x)} Monaten und ${fmt(d.y)} €. Dort sind beide Anbieter gleich teuer.`,
    success:"Du bearbeitest den vollständigen Tarifvergleich korrekt.",
    hint:"Startgebühr ist t, Monatspreis ist m. Für den Schnittpunkt setzt du beide Terme gleich."
  });
}
function genFixedValueComparison(task) {
  const d = tariffData();
  const x = rndInt(5,10);
  const a = round2(d.mA*x+d.tA), b = round2(d.mB*x+d.tB);
  const cheap = a < b ? "Anbieter A" : b < a ? "Anbieter B" : "beide gleich teuer";
  const accepted = cheap === "Anbieter A" ? ["anbietera","anbieter a","a"] : cheap === "Anbieter B" ? ["anbieterb","anbieter b","b"] : ["beide","gleich","beide gleich teuer"];
  return baseCopy(task,"numeric","Kosten bei einem bestimmten x-Wert vergleichen",`Anbieter A kostet ${fmt(d.tA)} € Grundgebühr + ${fmt(d.mA)} € pro Einheit. Anbieter B kostet ${fmt(d.tB)} € Grundgebühr + ${fmt(d.mB)} € pro Einheit. Berechne beide Preise für <strong>x = ${x}</strong> und entscheide, welcher Anbieter günstiger ist.`,[num("a","Preis Anbieter A",a),num("b","Preis Anbieter B",b),text("cheap","günstigerer Anbieter",accepted)],{
    success:`Richtig: Anbieter A kostet ${fmt(a)} €, Anbieter B kostet ${fmt(b)} €. Ergebnis: ${cheap}.`,
    hint:"Setze x in beide Kostenfunktionen ein und vergleiche."
  });
}
